spring.application.name=backend

# --- Database (set via env vars in dev/prod) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/trojanscheduler?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# --- Security ---
# HMAC secret for access tokens (base64 or plain text). Use a long random value in prod.
app.security.jwt.secret=${JWT_SECRET:dev-change-me-dev-change-me-dev-change-me}
app.security.jwt.issuer=${JWT_ISSUER:trojan-scheduler}
app.security.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:900}

app.security.refresh-token-ttl-seconds=${REFRESH_TTL_SECONDS:1209600}
app.security.refresh-cookie.name=${REFRESH_COOKIE_NAME:ts_refresh}
app.security.refresh-cookie.path=${REFRESH_COOKIE_PATH:/api/auth}
app.security.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
app.security.refresh-cookie.same-site=${REFRESH_COOKIE_SAMESITE:Lax}

# --- USC course data API ---
# Base URL for USC's course/section JSON endpoint. Set in prod; placeholder for dev.
app.usc.base-url=${USC_BASE_URL:https://classes.usc.edu}
app.usc.connect-timeout-ms=${USC_CONNECT_TIMEOUT_MS:5000}
app.usc.read-timeout-ms=${USC_READ_TIMEOUT_MS:15000}
app.usc.user-agent=${USC_USER_AGENT:TrojanScheduler/1.0}
app.usc.retry-max-attempts=${USC_RETRY_MAX_ATTEMPTS:3}
app.usc.retry-initial-backoff-ms=${USC_RETRY_INITIAL_BACKOFF_MS:1000}
app.usc.retry-max-backoff-ms=${USC_RETRY_MAX_BACKOFF_MS:30000}
# Path for course search: {termCode} and {q} are replaced. Example: /api/classes?term={termCode}&q={q}
app.usc.search-path-template=${USC_SEARCH_PATH:/api/classes?term={termCode}&q={q}}

# Search cache TTL (seconds)
app.cache.search-ttl-seconds=${CACHE_SEARCH_TTL_SECONDS:300}

# --- Watchlist polling (section seat checks) ---
# Interval between poll runs (ms). ~10 min = 600000
app.polling.interval-ms=${POLLING_INTERVAL_MS:600000}
# Max random jitter added before each run (ms) to avoid thundering herd
app.polling.jitter-ms=${POLLING_JITTER_MS:60000}
# Delay before first run after startup (ms)
app.polling.initial-delay-ms=${POLLING_INITIAL_DELAY_MS:30000}
# USC path for a single section: {termCode}, {sisSectionId} replaced
app.usc.section-path-template=${USC_SECTION_PATH:/api/section?term={termCode}&section={sisSectionId}}
