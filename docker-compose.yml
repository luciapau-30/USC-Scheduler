services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-trojandev}
      MYSQL_DATABASE: trojanscheduler
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-trojandev}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Spring Boot backend ────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/trojanscheduler?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-trojandev}
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-dev-change-me-dev-change-me}
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  # ── React frontend (served by nginx) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
